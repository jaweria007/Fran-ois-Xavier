            - img [ref=e57]
          - paragraph [ref=e59]: Le Cabinet veille à la préservation de vos droits statutaires et à la régularité des procédures vous concernant, à chaque étape de votre carrière.
        - generic [ref=e60]:
          - generic [ref=e61] [cursor=pointer]:
            - heading "Préserver votre carrière" [level=3] [ref=e62]
            - img [ref=e64]
          - paragraph [ref=e66]: Une décision administrative (mutation, titularisation, rémunération, avancement ou sanction disciplinaire) peut avoir des conséquences durables sur votre évolution professionnelle. Le Cabinet vous accompagne afin de protéger vos droits, votre réputation et vos perspectives d’avenir
        - generic [ref=e67]:
