              - heading "Vérifier la régularité de la procédure" [level=4] [ref=e142]
              - paragraph [ref=e143]: Analyse des délais, formalités, compétences et garanties applicables afin d'identifier d'éventuelles irrégularités de procédure.
            - generic [ref=e146]:
              - generic [ref=e147]: "02"
              - heading "Construire une stratégie de défense" [level=4] [ref=e148]
              - paragraph [ref=e149]: Identification des arguments les plus pertinents au regard de votre situation et des objectifs poursuivis.
            - generic [ref=e152]:
              - generic [ref=e153]: "03"
              - heading "Défendre vos droits" [level=4] [ref=e154]
              - paragraph [ref=e155]: Assistance et représentation devant l'administration, le conseil de discipline ou les juridictions administratives compétentes.
            - generic [ref=e158]:
              - generic [ref=e159]: "04"
              - heading "Obtenir réparation" [level=4] [ref=e160]
              - paragraph [ref=e161]: Contestations relatives à la carrière, à la rémunération, aux sanctions disciplinaires ou aux préjudices subis dans l'exercice des fonctions.
            - generic [ref=e164]:
              - generic [ref=e165]: "05"
              - heading "Sécuriser l'issue du dossier" [level=4] [ref=e166]
              - paragraph [ref=e167]: Recherche de solutions durables conciliant intérêts juridiques et enjeux professionnels.
    - generic [ref=e169]:
      - generic [ref=e170]:
        - generic [ref=e172]:
          - heading "Pourquoi choisir le Cabinet ?" [level=2] [ref=e173]
          - paragraph [ref=e174]: Le contentieux de la fonction publique comme le conseil est technique. Les règles de procédure et les droits de la défense jouent un rôle déterminant.
        - generic [ref=e177]:
          - generic [ref=e178]:
            - generic [ref=e179] [cursor=pointer]:
              - heading "Garantir le respect de vos droits" [level=3] [ref=e180]
              - img [ref=e182]
            - paragraph [ref=e185]: Le respect du contradictoire, l'accès au dossier et les droits de la défense constituent des garanties essentielles qu'il convient de préserver à chaque étape de la procédure.
          - generic [ref=e186]:
            - generic [ref=e187] [cursor=pointer]:
              - heading "Sécuriser votre stratégie contentieuse" [level=3] [ref=e188]
              - img [ref=e190]
            - paragraph [ref=e193]: Chaque recours obéit à des règles précises. Une stratégie adaptée permet de concentrer les efforts sur les moyens les plus pertinents et les plus efficaces.
          - generic [ref=e194]:
            - generic [ref=e195] [cursor=pointer]:
              - heading "Bénéficier d'un conseil indépendant" [level=3] [ref=e196]
              - img [ref=e198]
            - paragraph [ref=e201]: Soumis au secret professionnel et à une stricte obligation d'indépendance, le Cabinet vous accompagne exclusivement dans la défense de vos intérêts.
          - generic [ref=e202]:
            - generic [ref=e203] [cursor=pointer]:
              - heading "Rechercher une solution durable" [level=3] [ref=e204]
              - img [ref=e206]
            - paragraph [ref=e209]: Au-delà du contentieux, l'objectif est d'identifier une solution cohérente avec votre carrière, votre situation professionnelle et vos perspectives d'avenir.
