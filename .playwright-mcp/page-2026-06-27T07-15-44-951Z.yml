        - heading "COMMENT LE CABINET INTERVIENT EN MATIÈRE DE FONCTION PUBLIQUE" [level=2] [ref=e97]
        - paragraph [ref=e98]: Que vous soyez agent public ou employeur public, le Cabinet intervient à chaque étape afin de prévenir les litiges, défendre vos droits et sécuriser vos décisions.
      - generic [ref=e99]:
        - generic [ref=e100]:
          - heading "Avant tout contentieux" [level=3] [ref=e101]
          - generic [ref=e102]:
            - generic [ref=e106]:
              - generic [ref=e107]: "01"
              - heading "Analyser votre situation administrative" [level=4] [ref=e108]
              - paragraph [ref=e109]: Étude du statut, de la carrière, de la rémunération et des décisions prises par l'administration afin d'identifier les enjeux juridiques et les leviers d'action envisageables.
            - generic [ref=e112]:
              - generic [ref=e113]: "02"
              - heading "Identifier les droits mobilisables" [level=4] [ref=e114]
              - paragraph [ref=e115]: Mutation, reclassement, protection fonctionnelle, temps partiel ou révision d'évaluation.
            - generic [ref=e118]:
              - generic [ref=e119]: "03"
              - heading "Préparer les démarches administratives" [level=4] [ref=e120]
              - paragraph [ref=e121]: Rédaction des demandes, recours gracieux et échanges avec l'administration afin de présenter un dossier solide et cohérent.
            - generic [ref=e124]:
              - generic [ref=e125]: "04"
              - heading "Sécuriser les décisions" [level=4] [ref=e126]
              - paragraph [ref=e127]: Accompagnement des collectivités et établissements publics dans la régularité de leurs actes en respectant les procédures applicables et les droits des agents.
            - generic [ref=e130]:
              - generic [ref=e131]: "05"
              - heading "Prévenir le conflit" [level=4] [ref=e132]
              - paragraph [ref=e133]: Recherche de solutions permettant d'éviter une procédure longue et coûteuse.
