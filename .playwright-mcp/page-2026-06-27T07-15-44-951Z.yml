    - generic [ref=e21]:
      - heading "À qui s'adresse cette expertise ?" [level=2] [ref=e22]
      - paragraph [ref=e23]: Pour vous apporter de la clarté. La fonction publique désigne l'ensemble des agents qui travaillent au service de l'État, des collectivités territoriales et des établissements publics.
      - generic [ref=e25]:
        - generic [ref=e26]:
          - generic: "01"
          - img "Fonction publique" [ref=e28]
          - heading "Fonction publique d'État" [level=3] [ref=e29]
          - paragraph [ref=e30]: Agents des ministères, services déconcentrés et établissements publics nationaux confrontés à une problématique de carrière, de rémunération, de discipline ou de protection fonctionnelle.
        - generic [ref=e31]:
          - generic: "02"
          - img [ref=e33]
          - heading "Fonction publique territoriale" [level=3] [ref=e38]
          - paragraph [ref=e39]: Conseil et défense des agents territoriaux confrontés à une décision administrative affectant leur situation professionnelle.
        - generic [ref=e40]:
          - generic: "03"
          - img [ref=e42]
          - heading "Fonction publique hospitalière" [level=3] [ref=e45]
          - paragraph [ref=e46]: Assistance des agents hospitaliers dans les litiges liés à leur carrière, leur rémunération ou leurs conditions de travail.
    - generic [ref=e48]:
      - heading "Ce que vous gagnez concrètement grâce au Cabinet" [level=2] [ref=e50]
      - paragraph [ref=e51]: Avant de vous présenter les aspects techniques de votre dossier, découvrez les bénéfices concrets que le Cabinet Cornuot peut vous apporter.
      - generic [ref=e52]:
        - generic [ref=e53]:
