              - img [ref=e221]
              - generic [ref=e223]: À qui s'adresse le Cabinet ?
            - paragraph [ref=e225]: Le Cabinet accompagne les fonctionnaires, les agents contractuels, les collectivités territoriales, les établissements publics et les établissements hospitaliers.
          - generic [ref=e226]:
            - generic [ref=e227] [cursor=pointer]:
              - img [ref=e229]
              - generic [ref=e231]: Puis-je contester une sanction disciplinaire ?
            - paragraph [ref=e233]: Oui. Toute sanction doit respecter une procédure précise et les droits de la défense de l'agent.
          - generic [ref=e234]:
            - generic [ref=e235] [cursor=pointer]:
              - img [ref=e237]
              - generic [ref=e239]: Mon administration peut-elle refuser une mutation ou un reclassement ?
            - paragraph [ref=e241]: Certaines décisions peuvent être contestées lorsqu'elles méconnaissent les droits statutaires de l'agent ou reposent sur une erreur d'appréciation.
          - generic [ref=e242]:
            - generic [ref=e243] [cursor=pointer]:
              - img [ref=e245]
              - generic [ref=e247]: Qu'est-ce que la protection fonctionnelle ?
            - paragraph [ref=e249]: Il s'agit de la protection accordée par l'administration lorsqu'un agent est victime de menaces, violences, diffamations ou poursuites dans l'exercice de ses fonctions.
          - generic [ref=e250]:
            - generic [ref=e251] [cursor=pointer]:
              - img [ref=e253]
              - generic [ref=e255]: Une solution amiable est-elle possible ?
            - paragraph [ref=e257]: Oui. Selon la situation, une médiation, une négociation ou un recours administratif préalable peut permettre d'éviter un contentieux.
