      - heading "VOS QUESTIONS, MES RÉPONSES" [level=2] [ref=e179]
      - paragraph [ref=e181]:
        - text: Face à l'administration, l'incertitude est souvent plus difficile
        - text: à vivre que le litige lui-même. Voici les questions que mes clients
        - text: me posent en premier — et les réponses directes qu'elles méritent.
      - generic [ref=e183]:
        - generic [ref=e184] [cursor=pointer]:
          - generic [ref=e185]:
            - generic [ref=e186]: À qui s'adresse le Cabinet en droit public ?
            - generic [ref=e187]: +
          - generic: Le Cabinet accompagne les collectivités territoriales, leurs élus, leurs directions administratives, les agents publics, ainsi que les particuliers confrontés à une décision administrative ou à un litige d'urbanisme. Il intervient notamment auprès des communes, départements, régions, EPCI, maires, DGS, services RH, acheteurs publics, fonctionnaires, contractuels, riverains, propriétaires et porteurs de projets.
        - generic [ref=e189] [cursor=pointer]:
          - generic [ref=e190]:
            - generic [ref=e191]: Est-il trop tard pour agir ? J'ai reçu une décision il y a quelques semaines.
            - generic [ref=e192]: +
          - generic: "En droit administratif, les délais de recours sont courts (souvent deux mois) et leur non-respect rend la décision définitive. Mais « trop tard » ne veut pas toujours dire « sans recours ». Plusieurs situations permettent de rouvrir ou contourner ces délais : une notification irrégulière, l'absence de mentions obligatoires sur votre décision, ou l'existence de voies de recours parallèles. Et pour certains contentieux urgents (notamment en droit des étrangers) des procédures de référé permettent d'agir en quelques jours. La première chose que je vous conseille à faire : ne pas attendre davantage et me contacter."
        - generic [ref=e194] [cursor=pointer]:
          - generic [ref=e195]:
            - generic [ref=e196]: Faire appel à un Docteur en droit public, est-ce vraiment à ma portée financièrement ?
            - generic [ref=e197]: +
          - generic: C'est la question que beaucoup n'osent pas poser et pourtant c'est souvent la première qui se pose. La réponse est oui. Conformément à la déontologie de la profession, mes honoraires tiennent compte de la situation de fortune de chaque client, c'est une obligation légale, pas une promesse commerciale. Par ailleurs, votre assurance habitation ou auto inclut souvent une protection juridique qui peut couvrir tout ou partie des honoraires. Transparence totale sur les honoraires dès le premier rendez-vous, avant toute signature.
        - generic [ref=e199] [cursor=pointer]:
          - generic [ref=e200]:
            - generic [ref=e201]: Je suis fonctionnaire. Puis-je contester une décision de mon administration sans mettre ma carrière en danger ?
            - generic [ref=e202]: +
          - generic: "C'est la peur la plus silencieuse et la plus paralysante. Ce que la loi garantit : le recours à un avocat est votre droit, protégé par la Constitution. Votre employeur public ne peut légalement vous sanctionner pour avoir exercé un recours. Ce que je mets en place : une stratégie qui tient compte de vos objectifs réels (rester en poste, obtenir une mutation, être reconnu dans vos droits) pas seulement de l'angle juridique. Le secret professionnel protège intégralement nos échanges."
        - generic [ref=e204] [cursor=pointer]:
          - generic [ref=e205]:
            - generic [ref=e206]: Mon permis de construire vient d'être attaqué par un voisin. Dois-je vraiment m'en inquiéter ?
            - generic [ref=e207]: +
          - generic: Tout dépend de la solidité du recours adverse et de votre réactivité. Le voisin doit démontrer un intérêt à agir précis, respecter des délais stricts, notifier son recours. Beaucoup de recours sont irrecevables, encore faut-il le faire constater. Si le fond mérite d'être examiné, des outils de régularisation en cours d'instance permettent souvent de purger les vices allégués sans attendre l'annulation. Agir vite, c'est garder les meilleures cartes en main.
        - generic [ref=e209] [cursor=pointer]:
          - generic [ref=e210]:
            - generic [ref=e211]: J'ai reçu une OQTF. Est-ce vraiment la fin ?
            - generic [ref=e212]: +
          - generic: "Non — loin de là. Une OQTF est une décision administrative, et comme toute décision administrative, elle peut être contestée. Le juge est tenu d'examiner votre situation de manière individualisée : votre vie privée et familiale, votre ancienneté en France, vos attaches, les risques en cas de retour. Des procédures d'urgence permettent d'obtenir une décision en quelques jours. Dans de nombreux cas, l'annulation de l'OQTF conduit à la délivrance d'un titre de séjour. Recevoir une OQTF, c'est le début d'un combat juridique — pas la fin d'un droit."
        - generic [ref=e214] [cursor=pointer]:
          - generic [ref=e215]:
            - generic [ref=e216]: Vous êtes basé à Nanterre. Pouvez-vous intervenir pour ma situation, à l'autre bout de la France ?
            - generic [ref=e217]: +
          - generic: "Oui, et c'est une réalité quotidienne du cabinet. Le droit administratif se plaide devant les juridictions de toute la France (tribunaux administratifs, cours administratives d'appel, Conseil d'État). J'interviens régulièrement sur l'ensemble du territoire. La distance n'est pas un obstacle : échanges par courriel ou visioconférence, dossiers instruits à distance, déplacements pour les audiences lorsque nécessaire. Que vous soyez une commune de Haute-Savoie, un fonctionnaire à Bordeaux ou un ressortissant à Marseille : vos droits méritent la même défense — où que vous soyez en France."
